name: Deploy to Public Pages Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '>=22.12'
            cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check secrets (optional)
        run: |
          echo "VITE_API_TOKEN exists: ${{ secrets.VITE_API_TOKEN != '' && 'YES' || 'NO' }}"
          echo "VITE_API_BASE_URL exists: ${{ secrets.VITE_API_BASE_URL != '' && 'YES' || 'NO' }}"

      - name: Build project
        run: npm run build
        env:
          VITE_API_TOKEN: ${{ secrets.VITE_API_TOKEN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: ${{ secrets.PUBLIC_PAGES_BRANCH || 'gh-pages-br' }}

      